<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Dark background circle -->
  <circle cx="16" cy="16" r="16" fill="#0a1628"/>

  <!-- Radar rings -->
  <circle cx="16" cy="16" r="12" stroke="#1e3a5f" stroke-width="0.8" fill="none" opacity="0.6"/>
  <circle cx="16" cy="16" r="8"  stroke="#1e3a5f" stroke-width="0.8" fill="none" opacity="0.6"/>
  <circle cx="16" cy="16" r="4"  stroke="#1e3a5f" stroke-width="0.8" fill="none" opacity="0.6"/>

  <!-- Cross hairs -->
  <line x1="16" y1="4"  x2="16" y2="28" stroke="#1e3a5f" stroke-width="0.6" opacity="0.4"/>
  <line x1="4"  y1="16" x2="28" y2="16" stroke="#1e3a5f" stroke-width="0.6" opacity="0.4"/>

  <!-- Radar sweep (glowing wedge) -->
  <path d="M16 16 L26 8 A12 12 0 0 1 28 16 Z" fill="url(#sweep)" opacity="0.5"/>

  <!-- Radar arm -->
  <line x1="16" y1="16" x2="27" y2="9" stroke="#2563eb" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Center dot -->
  <circle cx="16" cy="16" r="1.8" fill="#2563eb"/>

  <!-- Blip -->
  <circle cx="23" cy="10" r="1.5" fill="#60a5fa" opacity="0.9"/>
  <circle cx="23" cy="10" r="2.8" fill="none" stroke="#60a5fa" stroke-width="0.7" opacity="0.4"/>

  <defs>
    <radialGradient id="sweep" cx="16" cy="16" r="12" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>
